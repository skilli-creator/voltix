<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Voltix • Automated Trading Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 50%, #0a0f1e, #06090f);
            color: #e2e8f0;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #22c55e, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .account-info { display: flex; gap: 20px; align-items: center; }
        .balance-display { background: rgba(34,197,94,0.15); padding: 6px 18px; border-radius: 40px; border: 1px solid rgba(34,197,94,0.3); }
        .balance-value { color: #22c55e; font-weight: 700; }
        .account-badge { background: #1e293b; padding: 4px 14px; border-radius: 20px; font-family: monospace; font-size: 13px; }
        .logout-btn { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); padding: 6px 18px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Dashboard */
        .dashboard { max-width: 1400px; margin: 24px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }

        /* Cards */
        .card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(34, 197, 94, 0.15);
            padding: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(34,197,94,0.1);
            padding-bottom: 12px;
        }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; color: #e2e8f0; }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        input, select {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus { border-color: #22c55e; }
        .select-wrapper { position: relative; }
        .select-wrapper select { width: 100%; padding: 10px 36px 10px 14px; appearance: none; }
        .select-wrapper .arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }

        /* Error state */
        .error-field {
            border: 2px solid #ef4444 !important;
            animation: shakeBlink 0.4s ease-in-out;
        }
        @keyframes shakeBlink {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
        }

        /* Notifications */
        .notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }
        .toast {
            background: #1e293b;
            border-left: 4px solid #22c55e;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #facc15; }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Market Analysis */
        .analysis-container { display: flex; gap: 24px; flex-wrap: wrap; }
        .digits-panel {
            flex: 2;
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
        }
        .digits-grid {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .digit-card {
            flex: 1;
            min-width: 60px;
            text-align: center;
            background: #020617;
            border-radius: 16px;
            padding: 12px 8px;
            transition: 0.2s;
        }
        .digit-number { font-size: 28px; font-weight: 800; }
        .digit-percent { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .digit-card.highlight { background: #22c55e20; border: 1px solid #22c55e; }
        .digit-card.lowlight { background: #ef444420; border: 1px solid #ef4444; }
        .price-panel {
            flex: 2;
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .price-big { font-size: 48px; font-weight: 800; font-family: monospace; }
        .price-change { font-size: 18px; margin-top: 8px; }
        .analysis-text {
            flex: 1;
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
        }
        .analysis-text p { color: #94a3b8; line-height: 1.5; font-size: 14px; }

        /* Buttons */
        .btn-start {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.05); }

        /* Open Trades */
        .open-trade-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 3px solid #22c55e;
        }
        .progress-bar { height: 4px; background: #1e293b; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #38bdf8); width: 0%; transition: width 0.3s; }

        /* Stats */
        .stats-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            flex: 1;
            background: #0f172a;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            min-width: 100px;
        }
        .stat-number { font-size: 28px; font-weight: 700; margin-top: 6px; }
        .win { color: #22c55e; }
        .loss { color: #ef4444; }

        /* Table */
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .history-table th { color: #94a3b8; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        .hidden { display: none; }

        @media (max-width: 1000px) { .analysis-container { flex-direction: column; } .topbar { flex-direction: column; gap: 12px; } }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">⚡ Voltix | Automated Terminal</div>
    <div class="account-info">
        <div class="balance-display">💰 <span id="balance" class="balance-value">$0.00</span></div>
        <div class="account-badge" id="accountId">---</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="notification-container" id="notificationContainer"></div>

<div class="dashboard">
    <!-- SECTION 1: TRADE CONFIGURATION -->
    <div class="card">
        <div class="card-header"><h3>⚙️ Trade Configuration</h3></div>
        <div class="form-grid">
            <div class="input-group"><label>📊 Market</label>
                <div class="select-wrapper"><select id="market">
                    <option value="">Select Market</option>
                    <optgroup label="Standard Volatility">
                        <option value="R_10">Volatility 10</option><option value="R_25">Volatility 25</option>
                        <option value="R_30">Volatility 30</option><option value="R_50">Volatility 50</option>
                        <option value="R_75">Volatility 75</option><option value="R_90">Volatility 90</option>
                    </optgroup>
                    <optgroup label="Fast Markets (1s)">
                        <option value="1HZ10V">Volatility 10 (1s)</option><option value="1HZ25V">Volatility 25 (1s)</option>
                        <option value="1HZ50V">Volatility 50 (1s)</option><option value="1HZ75V">Volatility 75 (1s)</option>
                        <option value="1HZ100V">Volatility 100 (1s)</option>
                    </optgroup>
                </select><span class="arrow">⌄</span></div>
            </div>
            <div class="input-group"><label>🎯 Trade Type</label>
                <div class="select-wrapper"><select id="tradeType">
                    <option value="">Select Trade Type</option>
                    <option value="Rise/Fall">📈 Rise/Fall</option><option value="Higher/Lower">⬆️ Higher/Lower</option>
                    <option value="Even/Odd">🔢 Even/Odd</option><option value="Matches/Differs">🎯 Matches/Differs</option>
                    <option value="Over/Under">🎲 Over/Under</option>
                </select><span class="arrow">⌄</span></div>
            </div>
            <div class="input-group"><label>💰 Stake (Min $1.50)</label><input type="number" id="stake" step="0.5" min="1.5" placeholder="Enter stake"></div>
            <div class="input-group"><label>⏱️ Duration</label>
                <div class="select-wrapper"><select id="duration">
                    <option value="">Select Duration</option>
                </select><span class="arrow">⌄</span></div>
            </div>
        </div>
        <div class="form-grid" id="additionalFieldContainer" style="margin-bottom: 16px;"></div>
        <div class="form-grid" style="margin-bottom: 16px;">
            <div class="input-group"><label>🎯 Take Profit ($) - Optional</label><input type="number" id="tp" step="1" placeholder="e.g., 50"></div>
            <div class="input-group"><label>🛡️ Stop Loss ($) - Optional</label><input type="number" id="sl" step="1" placeholder="e.g., 20"></div>
            <div class="input-group"><label>🔄 Trade Loops - Optional</label><input type="number" id="loops" placeholder="Number of trades"></div>
            <div class="input-group"><label>📈 Martingale (OFF by default)</label>
                <div style="display: flex; align-items: center; gap: 10px; background:#0f172a; padding: 8px 12px; border-radius: 40px; width: fit-content;">
                    <span style="font-size:12px;">OFF</span>
                    <input type="checkbox" id="martingale" style="width: 40px; margin:0;">
                    <span style="font-size:12px;">ON</span>
                </div>
            </div>
        </div>
        <button class="btn-start" id="startBotBtn">🚀 START BOT</button>
    </div>

    <!-- SECTION 2: MARKET ANALYSIS -->
    <div class="card">
        <div class="card-header"><h3>📊 Market Analysis</h3><span id="analysisBadge" style="background:#0f172a; padding:4px 12px; border-radius:20px; font-size:11px;">Ready</span></div>
        <div id="analysisContent" class="analysis-container"><div style="width:100%; text-align:center; padding:40px;">Select trade type to view analysis</div></div>
    </div>

    <!-- SECTION 3: OPEN TRADES (Hidden by default) -->
    <div class="card" id="openTradesCard" style="display: none;">
        <div class="card-header"><h3>📊 Open Positions</h3><span id="openCount" class="account-badge">0</span></div>
        <div id="openTradesList"></div>
    </div>

    <!-- SECTION 4: TRADE HISTORY -->
    <div class="card">
        <div class="card-header"><h3>📜 Trade History</h3><button id="refreshHistory" style="background:none; border:none; color:#22c55e; cursor:pointer;">⟳ Refresh</button></div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-title">Total Trades</div><div class="stat-number" id="totalTrades">0</div></div>
            <div class="stat-card win"><div class="stat-title">Wins</div><div class="stat-number win" id="winsCount">0</div></div>
            <div class="stat-card loss"><div class="stat-title">Losses</div><div class="stat-number loss" id="lossesCount">0</div></div>
            <div class="stat-card"><div class="stat-title">Win Rate</div><div class="stat-number" id="winRate">0%</div></div>
            <div class="stat-card"><div class="stat-title">Net Profit</div><div class="stat-number" id="netProfit">$0</div></div>
        </div>
        <div style="overflow-x:auto;">
            <table class="history-table"><thead><tr><th>Time</th><th>Market</th><th>Direction</th><th>Stake</th><th>Result</th><th>P/L</th></tr></thead><tbody id="historyBody"><tr><td colspan="6" style="text-align:center;">No trades yet</td></tr></tbody></table>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    let autoBotActive = false;
    let botLoopCount = 0;
    let botCurrentProfit = 0;

    function getToken() { return localStorage.getItem('token'); }
    function showNotification(msg, type = 'info') { const container = document.getElementById('notificationContainer'); const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerText = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 4000); }

    async function fetchBalance() { try { const res = await fetch(`${API_BASE}/deriv/balance`, { headers: { 'Authorization': `Bearer ${getToken()}` } }); if (res.ok) { const data = await res.json(); document.getElementById('balance').innerText = `$${data.balance.toFixed(2)}`; document.getElementById('accountId').innerText = data.account_id || 'VRTC'; } } catch(e) { console.warn(e); } }
    async function fetchTradeHistory() { try { const res = await fetch(`${API_BASE}/deriv/trade-history?limit=50`, { headers: { 'Authorization': `Bearer ${getToken()}` } }); if (res.ok) { const data = await res.json(); const history = data.history || []; const tbody = document.getElementById('historyBody'); if (!history.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No trades yet</td></tr>'; return; } tbody.innerHTML = history.map(t => { const profit = t.profit || 0; const isWin = profit > 0; return `<tr><td>${t.transaction_time ? new Date(t.transaction_time*1000).toLocaleTimeString() : '—'}</td><td>${t.symbol || '—'}</td><td class="${isWin ? 'win' : 'loss'}">${t.contract_type === 'CALL' ? 'RISE' : 'FALL'}</td><td>$${Math.abs(t.amount || 0).toFixed(2)}</td><td class="${isWin ? 'win' : 'loss'}">${isWin ? 'Won' : 'Lost'}</td><td class="${isWin ? 'win' : 'loss'}">${profit>0?'+':''}$${profit.toFixed(2)}</td></tr>`; }).join(''); const wins = history.filter(t => (t.profit || 0) > 0).length; const losses = history.filter(t => (t.profit || 0) < 0).length; const totalProfit = history.reduce((s,t) => s + (t.profit || 0), 0); document.getElementById('totalTrades').innerText = history.length; document.getElementById('winsCount').innerText = wins; document.getElementById('lossesCount').innerText = losses; document.getElementById('winRate').innerText = history.length ? ((wins/history.length)*100).toFixed(1)+'%' : '0%'; document.getElementById('netProfit').innerHTML = totalProfit >=0 ? `+$${totalProfit.toFixed(2)}` : `-$${Math.abs(totalProfit).toFixed(2)}`; } } catch(e) { console.warn(e); } }

    function updateDurationOptions() { const tradeType = document.getElementById('tradeType').value; const durationSelect = document.getElementById('duration'); durationSelect.innerHTML = '<option value="">Select Duration</option>'; const isDigitType = ['Even/Odd', 'Matches/Differs', 'Over/Under'].includes(tradeType); if (isDigitType) for (let i=1; i<=10; i++) durationSelect.innerHTML += `<option value="${i}t">${i} Tick${i>1 ? 's' : ''}</option>`; else for (let i=1; i<=10; i++) durationSelect.innerHTML += `<option value="${i}m">${i} Minute${i>1 ? 's' : ''}</option>`; }

    function updateAdditionalField() { const tradeType = document.getElementById('tradeType').value; const container = document.getElementById('additionalFieldContainer'); if (tradeType === 'Even/Odd') container.innerHTML = `<div class="input-group"><label>🔢 Select Option</label><div class="select-wrapper"><select id="evenOddChoice"><option value="">Select</option><option value="Even">Even</option><option value="Odd">Odd</option></select><span class="arrow">⌄</span></div></div>`; else if (tradeType === 'Matches/Differs') container.innerHTML = `<div class="input-group"><label>🎯 Select Option</label><div class="select-wrapper"><select id="matchesDiffersChoice"><option value="">Select</option><option value="Matches">Matches</option><option value="Differs">Differs</option></select><span class="arrow">⌄</span></div></div>`; else if (tradeType === 'Over/Under') container.innerHTML = `<div class="input-group"><label>🎲 Over/Under Digit</label><div class="select-wrapper"><select id="overUnderChoice"><option value="">Select Digit</option><option value="0">Over 0 / Under 0</option><option value="1">Over 1 / Under 1</option><option value="2">Over 2 / Under 2</option><option value="3">Over 3 / Under 3</option><option value="4">Over 4 / Under 4</option><option value="5">Over 5 / Under 5</option><option value="6">Over 6 / Under 6</option><option value="7">Over 7 / Under 7</option><option value="8">Over 8 / Under 8</option><option value="9">Over 9 / Under 9</option></select><span class="arrow">⌄</span></div><div style="margin-top:8px; font-size:11px; color:#64748b;">Bot will automatically choose Over/Under based on market bias</div></div>`; else container.innerHTML = ''; }

    function validateInputs() { let valid = true; const required = ['market', 'tradeType', 'stake', 'duration']; required.forEach(id => { const el = document.getElementById(id); if (!el.value || el.value.trim() === '') { el.classList.add('error-field'); valid = false; showNotification(`❌ ${id.toUpperCase()} is required`, 'error'); } else el.classList.remove('error-field'); }); const tradeType = document.getElementById('tradeType').value; if (tradeType === 'Even/Odd' && !document.getElementById('evenOddChoice')?.value) { document.getElementById('evenOddChoice')?.classList.add('error-field'); valid = false; showNotification('❌ Please select Even or Odd', 'error'); } if (tradeType === 'Matches/Differs' && !document.getElementById('matchesDiffersChoice')?.value) { document.getElementById('matchesDiffersChoice')?.classList.add('error-field'); valid = false; showNotification('❌ Please select Matches or Differs', 'error'); } if (tradeType === 'Over/Under' && !document.getElementById('overUnderChoice')?.value) { document.getElementById('overUnderChoice')?.classList.add('error-field'); valid = false; showNotification('❌ Please select Over/Under digit', 'error'); } const stakeVal = parseFloat(document.getElementById('stake').value); if (stakeVal < 1.5 && document.getElementById('stake').value !== '') { document.getElementById('stake').classList.add('error-field'); showNotification('❌ Minimum stake is $1.50', 'error'); valid = false; } return valid; }

    async function placeBotTrade(direction) { const symbol = document.getElementById('market').value; const amount = parseFloat(document.getElementById('stake').value); const durationVal = document.getElementById('duration').value; const durationNum = parseInt(durationVal); const durationUnit = durationVal.includes('t') ? 't' : 'm'; try { const res = await fetch(`${API_BASE}/deriv/place-trade`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }, body: JSON.stringify({ symbol, direction: direction === 'Rise' ? 'Rise' : 'Fall', amount, duration: durationNum, duration_unit: durationUnit }) }); const data = await res.json(); if (res.ok) { showNotification(`✅ Trade placed: ${direction}`, 'success'); setTimeout(() => { fetchBalance(); fetchTradeHistory(); }, 1500); return true; } else { showNotification(`❌ Trade failed: ${data.error}`, 'error'); return false; } } catch(e) { showNotification('Connection error', 'error'); return false; } }

    async function startAutoBot() { if (!validateInputs()) return; const loops = parseInt(document.getElementById('loops').value) || 999; const tp = parseFloat(document.getElementById('tp').value); const sl = parseFloat(document.getElementById('sl').value); autoBotActive = true; botLoopCount = 0; botCurrentProfit = 0; const btn = document.getElementById('startBotBtn'); btn.innerText = '🛑 STOP BOT'; btn.style.background = '#ef4444'; const runTrade = async () => { if (!autoBotActive) return; if (botLoopCount >= loops) { stopAutoBot(); showNotification('✅ Bot completed all trades', 'success'); return; } const direction = getBotDirection();
    const success = await placeBotTrade(direction); if (success) { botLoopCount++; await fetchTradeHistory(); const netSpan = document.getElementById('netProfit'); let net = 0; try { net = parseFloat(netSpan.innerText.replace('+','').replace('$','')); } catch(e){} botCurrentProfit = net; if (tp && botCurrentProfit >= tp) { stopAutoBot(); showNotification(`🎯 Take Profit reached: +$${tp}`, 'success'); return; } if (sl && botCurrentProfit <= -sl) { stopAutoBot(); showNotification(`🛑 Stop Loss hit: -$${sl}`, 'error'); return; } } if (autoBotActive) setTimeout(runTrade, 7000); }; runTrade(); }
    function stopAutoBot() { autoBotActive = false; const btn = document.getElementById('startBotBtn'); btn.innerText = '🚀 START BOT'; btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)'; showNotification('Bot stopped', 'info'); }

    function updateMarketAnalysis() { const tradeType = document.getElementById('tradeType').value; const container = document.getElementById('analysisContent'); if (!tradeType) { container.innerHTML = '<div style="width:100%; text-align:center; padding:40px;">Select trade type to view analysis</div>'; return; } const isDigitType = ['Even/Odd', 'Matches/Differs', 'Over/Under'].includes(tradeType); if (isDigitType) { const percentages = [10.8, 11.1, 9.5, 8.9, 10.3, 11.7, 7.8, 9.0, 11.2, 9.7]; const maxIdx = percentages.indexOf(Math.max(...percentages)); const minIdx = percentages.indexOf(Math.min(...percentages)); container.innerHTML = `<div class="digits-panel"><div class="digits-grid">${percentages.map((p, i) => `<div class="digit-card ${i===maxIdx ? 'highlight' : i===minIdx ? 'lowlight' : ''}"><div class="digit-number">${i}</div><div class="digit-percent">${p}%</div></div>`).join('')}</div><div class="analysis-text"><p>Digit ${maxIdx} shows highest frequency (${percentages[maxIdx]}%). ${maxIdx % 2 === 0 ? 'Even' : 'Odd'} numbers currently dominate. Suggested strategy: trade ${maxIdx % 2 === 0 ? 'Even' : 'Odd'} for next tick.</p></div></div>`; } else { container.innerHTML = `<div class="price-panel"><div class="price-big" id="livePrice">$1,234.56</div><div class="price-change" id="priceChange">+0.23%</div><div style="margin-top:16px; font-size:12px;">Volatility 75 • Live ticker</div></div><div class="analysis-text"><p>🟢 Uptrend confirmed above moving average. RSI at 62 indicates moderate bullish momentum. Support at 1,230. Recommended: RISE on pullbacks.</p></div>`; let interval = setInterval(() => { if (document.getElementById('livePrice')) { const current = 1234 + Math.random() * 20 - 10; document.getElementById('livePrice').innerText = `$${current.toFixed(2)}`; const change = parseFloat((Math.random() * 2 - 1).toFixed(2)); const changeEl = document.getElementById('priceChange'); changeEl.innerText = `${change > 0 ? '+' : ''}${change}%`; changeEl.style.color = change > 0 ? '#22c55e' : '#ef4444'; } else clearInterval(interval); }, 3000); } }

    async function fetchOpenTrades() { try { const res = await fetch(`${API_BASE}/deriv/active-contracts`, { headers: { 'Authorization': `Bearer ${getToken()}` } }); if (res.ok) { const data = await res.json(); const contracts = data.contracts || []; const card = document.getElementById('openTradesCard'); const container = document.getElementById('openTradesList'); const countSpan = document.getElementById('openCount'); if (!contracts.length) { card.style.display = 'none'; return; } card.style.display = 'block'; countSpan.innerText = contracts.length; container.innerHTML = contracts.map(c => `<div class="open-trade-item"><div style="display:flex; justify-content:space-between;"><span>${c.symbol || '—'}</span><span>$${parseFloat(c.buy_price || 0).toFixed(2)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.random()*100}%"></div></div><div style="font-size:12px;">Payout: $${parseFloat(c.payout || 0).toFixed(2)}</div></div>`).join(''); } } catch(e) { console.warn(e); } }

    document.getElementById('tradeType').addEventListener('change', () => { updateDurationOptions(); updateAdditionalField(); updateMarketAnalysis(); });
    document.getElementById('startBotBtn').addEventListener('click', () => { if (autoBotActive) stopAutoBot(); else startAutoBot(); });
    document.getElementById('refreshHistory').addEventListener('click', fetchTradeHistory);
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'login.html'; });
    document.getElementById('martingale').addEventListener('change', (e) => showNotification(`Martingale ${e.target.checked ? 'ON' : 'OFF'}`, 'info'));

    async function init() { if (!localStorage.getItem('token')) { window.location.href = 'login.html'; return; } await fetchBalance(); await fetchTradeHistory(); await fetchOpenTrades(); updateDurationOptions(); updateAdditionalField(); updateMarketAnalysis(); setInterval(() => { fetchBalance(); fetchOpenTrades(); }, 10000); }
    init();
    function getBotDirection() {
    const tradeType = document.getElementById('tradeType').value;

    // Simple smart logic (you can upgrade later)
    if (tradeType === 'Rise/Fall') {
        return Math.random() > 0.5 ? 'Rise' : 'Fall';
    }

    if (tradeType === 'Even/Odd') {
        const choice = document.getElementById('evenOddChoice')?.value;
        return choice === 'Even' ? 'Rise' : 'Fall';
    }

    return 'Rise'; // fallback
}
</script>
