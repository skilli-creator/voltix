<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Voltix • Sign In</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at 30% 20%, #0a1428, #02040c);
    color: #f1f5f9;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(rgba(56, 189, 248, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 300px; height: 300px; background: #22c55e; top: -100px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -150px; right: -100px; }

  .login-container {
    width: 100%;
    max-width: 480px;
    padding: 44px 40px;
    background: rgba(8, 18, 38, 0.8);
    backdrop-filter: blur(18px);
    border-radius: 52px;
    box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(34, 197, 94, 0.2);
    text-align: center;
    position: relative;
    z-index: 2;
    animation: fadeSlideUp 0.6s ease;
  }

  .login-container:hover {
    transform: translateY(-3px);
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    padding: 8px 22px;
    border-radius: 60px;
    margin-bottom: 28px;
    font-weight: 700;
    font-size: 14px;
    color: #0a0f1f;
  }

  .login-container h2 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffffff, #94a3b8);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  .subhead {
    font-size: 0.85rem;
    color: #9ca3af;
    margin-bottom: 32px;
  }

  /* toggle between email/phone */
  .login-method-toggle {
    display: flex;
    gap: 12px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 60px;
    padding: 6px;
    margin-bottom: 28px;
  }

  .toggle-option {
    flex: 1;
    padding: 10px;
    border-radius: 40px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    background: transparent;
    color: #94a3b8;
    border: none;
  }

  .toggle-option.active {
    background: linear-gradient(105deg, #22c55e, #16a34a);
    color: #0a0f1f;
    box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
  }

  .input-group {
    margin-bottom: 24px;
    text-align: left;
  }

  .input-group label {
    font-size: 13px;
    font-weight: 500;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 32px;
    border: 1.5px solid rgba(255, 255, 255, 0.08);
    background: #0a122a;
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .input-group input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    background: #0f1838;
  }

  .password-wrapper {
    position: relative;
  }

  .toggle-password {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    background: none;
    border: none;
    font-size: 18px;
    color: #9ca3af;
  }

  .options-row {
    display: flex;
    justify-content: flex-end;
    margin: 16px 0 24px;
  }

  .forgot-link {
    color: #3b82f6;
    cursor: pointer;
    font-size: 13px;
    text-decoration: none;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(105deg, #22c55e, #16a34a);
    color: #0a0f1f;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(105deg, #2dd4bf, #22c55e);
  }

  .message-area {
    margin-top: 20px;
    font-size: 13px;
    min-height: 44px;
    padding: 8px;
    border-radius: 60px;
    background: rgba(0, 0, 0, 0.3);
  }

  .register-link {
    margin-top: 28px;
    font-size: 13px;
    color: #94a3b8;
  }

  .register-link a {
    color: #22c55e;
    text-decoration: none;
    font-weight: 600;
  }

  .footer-note {
    position: absolute;
    bottom: 16px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #4b5563;
    z-index: 2;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .login-container { padding: 32px 24px; margin: 16px; }
    .login-container h2 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-container">
  <div class="logo-badge">
    ⚡ Voltix • Sign In
  </div>
  <h2>Welcome Back</h2>
  <p class="subhead">Access your trading dashboard</p>

  <!-- login method toggle -->
  <div class="login-method-toggle">
    <button class="toggle-option active" id="toggleEmailBtn">📧 Email</button>
    <button class="toggle-option" id="togglePhoneBtn">📱 Phone</button>
  </div>

  <form id="loginForm">
    <!-- Email input (default visible) -->
    <div class="input-group" id="emailGroup">
      <label>📧 Email Address</label>
      <input type="email" id="emailInput" placeholder="trader@example.com" autocomplete="email">
    </div>

    <!-- Phone input (hidden by default) -->
    <div class="input-group" id="phoneGroup" style="display: none;">
      <label>📞 Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="+1 234 567 8900" autocomplete="tel">
      <div style="font-size: 10px; color: #6b7280; margin-top: 4px;">Include country code (e.g., +1, +44)</div>
    </div>

    <div class="input-group">
      <label>🔒 Password</label>
      <div class="password-wrapper">
        <input type="password" id="passwordInput" placeholder="••••••••" required>
        <button type="button" class="toggle-password" id="togglePasswordBtn">👁️</button>
      </div>
    </div>

    <div class="options-row">
      <a class="forgot-link" href="forgotpass.html">Forgot password?</a>
    </div>

    <button class="login-btn" type="submit">🚀 Sign In</button>
  </form>

  <div class="message-area" id="loginMessage"></div>

  <div class="register-link">
    Don't have an account? <a href="register.html">Create free account →</a>
  </div>
</div>

<footer class="footer-note">
  © 2026 Voltix — AI Powered Trading Platform
</footer>

<script>
  const API_BASE_URL = 'http://192.168.1.106:5000/api';

  // DOM Elements
  const emailGroup = document.getElementById('emailGroup');
  const phoneGroup = document.getElementById('phoneGroup');
  const toggleEmail = document.getElementById('toggleEmailBtn');
  const togglePhone = document.getElementById('togglePhoneBtn');
  const emailInput = document.getElementById('emailInput');
  const phoneInput = document.getElementById('phoneInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginMessage = document.getElementById('loginMessage');

  let activeMethod = 'email'; // 'email' or 'phone'

  // Toggle between email and phone login
  toggleEmail.addEventListener('click', () => {
    activeMethod = 'email';
    toggleEmail.classList.add('active');
    togglePhone.classList.remove('active');
    emailGroup.style.display = 'block';
    phoneGroup.style.display = 'none';
    emailInput.required = true;
    phoneInput.required = false;
    loginMessage.innerHTML = '';
  });

  togglePhone.addEventListener('click', () => {
    activeMethod = 'phone';
    togglePhone.classList.add('active');
    toggleEmail.classList.remove('active');
    emailGroup.style.display = 'none';
    phoneGroup.style.display = 'block';
    emailInput.required = false;
    phoneInput.required = true;
    loginMessage.innerHTML = '';
  });

  // Toggle password visibility
  document.getElementById('togglePasswordBtn').addEventListener('click', () => {
    const passwordInput = document.getElementById('passwordInput');
    const btn = document.getElementById('togglePasswordBtn');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      btn.textContent = '🙈';
    } else {
      passwordInput.type = 'password';
      btn.textContent = '👁️';
    }
  });

  // Validate phone number format
  function validatePhone(phone) {
    const digits = phone.replace(/\D/g, '');
    return digits.length >= 8 && digits.length <= 15;
  }

  // Login form submission
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const password = passwordInput.value.trim();
    let identifier = '';
    let isValid = true;

    // Get identifier based on active method
    if (activeMethod === 'email') {
      identifier = emailInput.value.trim();
      if (!identifier || !identifier.includes('@')) {
        loginMessage.innerHTML = '❌ Please enter a valid email address';
        loginMessage.style.color = '#f87171';
        isValid = false;
      }
    } else {
      identifier = phoneInput.value.trim();
      if (!identifier) {
        loginMessage.innerHTML = '❌ Please enter your phone number';
        loginMessage.style.color = '#f87171';
        isValid = false;
      } else if (!validatePhone(identifier)) {
        loginMessage.innerHTML = '❌ Please enter a valid phone number with country code (e.g., +1234567890)';
        loginMessage.style.color = '#f87171';
        isValid = false;
      }
    }

    if (!password) {
      loginMessage.innerHTML = '❌ Please enter your password';
      loginMessage.style.color = '#f87171';
      isValid = false;
    }

    if (!isValid) return;

    loginMessage.innerHTML = '⏳ Authenticating...';
    loginMessage.style.color = '#94a3b8';

    try {
      // Build payload based on login method
      const payload = activeMethod === 'email' 
        ? { email: identifier, password }
        : { phone: identifier, password };

      const response = await fetch(`${API_BASE_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        loginMessage.innerHTML = '✅ Login successful! Redirecting...';
        loginMessage.style.color = '#22c55e';
        setTimeout(() => {
          window.location.href = 'marketsdash.html';
        }, 1500);
      } else {
        loginMessage.innerHTML = `❌ ${data.error || 'Login failed'}`;
        loginMessage.style.color = '#f87171';
      }
    } catch (error) {
      console.error('Login error:', error);
      loginMessage.innerHTML = '❌ Cannot connect to server. Please make sure the backend is running on port 5000.';
      loginMessage.style.color = '#f87171';
    }
  });

  // Forgot password
  document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const identifier = activeMethod === 'email' ? email : phone;
    
    alert(`Password reset request for: ${identifier}\n\nPlease contact admin@voltix.com for assistance.`);
  });
</script>
</body>
</html>
