<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voltix • Forgot Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at 30% 20%, #0a1428, #02040c);
    color: white;
    padding: 20px;
  }
  .container {
    max-width: 450px;
    width: 100%;
    padding: 44px 40px;
    background: rgba(8, 18, 38, 0.85);
    backdrop-filter: blur(18px);
    border-radius: 52px;
    text-align: center;
    border: 1px solid rgba(34, 197, 94, 0.2);
  }
  .logo {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #22c55e, #38bdf8);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 20px;
  }
  h2 { margin-bottom: 10px; }
  .subhead { color: #9ca3af; font-size: 0.85rem; margin-bottom: 30px; }
  .input-group { text-align: left; margin-bottom: 24px; }
  label { font-size: 13px; color: #cbd5e1; display: block; margin-bottom: 8px; }
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 32px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: #0a122a;
    color: white;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #22c55e; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(105deg, #22c55e, #16a34a);
    color: #0a0f1f;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  button:hover { transform: translateY(-2px); }
  .message {
    margin-top: 20px;
    font-size: 13px;
    padding: 10px;
    border-radius: 60px;
    background: rgba(0, 0, 0, 0.3);
  }
  .back-link { margin-top: 20px; font-size: 13px; }
  .back-link a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">⚡ Voltix</div>
  <h2>Forgot Password?</h2>
  <p class="subhead">Enter your email to receive a reset code</p>
  
  <form id="forgotForm">
    <div class="input-group">
      <label>📧 Email Address</label>
      <input type="email" id="email" placeholder="trader@example.com" required autofocus>
    </div>
    <button type="submit">Send Reset Code →</button>
  </form>
  
  <div class="message" id="message"></div>
  <div class="back-link"><a href="login.html">← Back to Login</a></div>
</div>

<script>
const API_BASE = 'http://localhost:5000/api';

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const messageDiv = document.getElementById('message');
  
  if (!email) {
    messageDiv.innerHTML = '❌ Please enter your email address';
    messageDiv.style.color = '#f87171';
    return;
  }
  
  messageDiv.innerHTML = '⏳ Sending reset code...';
  messageDiv.style.color = '#94a3b8';
  
  try {
    const response = await fetch(`${API_BASE}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      sessionStorage.setItem('resetEmail', email);
      messageDiv.innerHTML = '✅ Reset code sent! Redirecting...';
      messageDiv.style.color = '#22c55e';
      setTimeout(() => {
        window.location.href = 'verifyresetcode.html';
      }, 1500);
    } else {
      messageDiv.innerHTML = `❌ ${data.error}`;
      messageDiv.style.color = '#f87171';
    }
  } catch (error) {
    messageDiv.innerHTML = '❌ Cannot connect to server';
    messageDiv.style.color = '#f87171';
  }
});
</script>
</body>
</html>
