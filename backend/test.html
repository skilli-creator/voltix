<!DOCTYPE html>
<html>
<head>
    <title>Test Deriv Connection</title>
    <style>
        body {
            font-family: Arial;
            background: #0a1428;
            color: white;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }
        button {
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔧 Test Deriv Connection</h2>
    
    <label>Your JWT Token (from login)</label>
    <input type="text" id="jwtToken" placeholder="eyJhbGciOiJIUzI1NiIs...">
    
    <label>Your Deriv API Token</label>
    <input type="password" id="derivToken" placeholder="Z_cb...">
    
    <button onclick="testConnection()">Test Connection</button>
    
    <div class="result" id="result">Click the button to test...</div>
</div>

<script>
    async function testConnection() {
        const jwtToken = document.getElementById('jwtToken').value;
        const derivToken = document.getElementById('derivToken').value;
        const resultDiv = document.getElementById('result');
        
        if (!jwtToken) {
            resultDiv.innerHTML = '❌ Please enter your JWT token';
            return;
        }
        
        if (!derivToken) {
            resultDiv.innerHTML = '❌ Please enter your Deriv API token';
            return;
        }
        
        resultDiv.innerHTML = '⏳ Connecting to Deriv...';
        
        try {
            const response = await fetch('http://localhost:5000/api/deriv/connect', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${jwtToken}`
                },
                body: JSON.stringify({
                    api_token: derivToken,
                    account_type: 'Demo'
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                resultDiv.innerHTML = '✅ SUCCESS!\n\n' + JSON.stringify(data, null, 2);
            } else {
                resultDiv.innerHTML = '❌ FAILED!\n\n' + JSON.stringify(data, null, 2);
            }
        } catch (error) {
            resultDiv.innerHTML = '❌ ERROR: ' + error.message;
        }
    }
</script>
</body>
</html>
